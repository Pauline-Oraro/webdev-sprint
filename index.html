<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>webdev-sprint</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #555570;
      --done: #00ff88;
      --progress: #f59e0b;
      --pending: #2a2a3a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* GRID BG */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* GLOW */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0,255,136,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* HEADER */
    header {
      padding: 64px 0 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* STATS BAR */
    .stats {
      display: flex;
      gap: 2px;
      margin-bottom: 56px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
    }

    .stat {
      flex: 1;
      padding: 20px 24px;
      border-right: 1px solid var(--border);
      transition: background 0.2s;
    }

    .stat:last-child { border-right: none; }
    .stat:hover { background: #16161f; }

    .stat-num {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      display: block;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      display: block;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      margin-bottom: 56px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress-pct {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #00ccff);
      border-radius: 99px;
      width: 0%;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* WEEK SECTION */
    .week {
      margin-bottom: 40px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .week-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .week-num {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .week-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .week-dates {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    /* PROJECTS GRID */
    .projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 600px) {
      .projects { grid-template-columns: 1fr; }
      .stats { flex-direction: column; }
      .stat { border-right: none; border-bottom: 1px solid var(--border); }
    }

    .card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: radial-gradient(circle at 30% 50%, rgba(0,255,136,0.05), transparent 60%);
      transition: opacity 0.3s;
    }

    .card:hover { border-color: var(--accent); transform: translateY(-2px); background: #13131c; }
    .card:hover::before { opacity: 1; }

    .card.done { border-color: rgba(0,255,136,0.3); }
    .card.pending { opacity: 0.5; pointer-events: none; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .card-num {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 99px;
      text-transform: uppercase;
    }

    .badge.done    { background: rgba(0,255,136,0.1); color: var(--done); border: 1px solid rgba(0,255,136,0.3); }
    .badge.wip     { background: rgba(245,158,11,0.1); color: var(--progress); border: 1px solid rgba(245,158,11,0.3); }
    .badge.pending { background: var(--pending); color: var(--muted); border: 1px solid var(--border); }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-pill {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      padding: 2px 8px;
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 99px;
    }

    .card-arrow {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 14px;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

    /* FOOTER */
    footer {
      text-align: center;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <span class="tag">May → July 2026 &nbsp;·&nbsp; Web Design and Development Unit</span>
    <h1>webdev<span>-sprint</span></h1>
    <p class="subtitle">// 24 projects · 12 weeks · 2 per week</p>
  </header>

  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="done-count">0</span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="wip-count">0</span>
      <span class="stat-label">In Progress</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="pending-count">24</span>
      <span class="stat-label">Remaining</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="week-count">0</span>
      <span class="stat-label">Weeks Done</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">Overall Progress</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div id="weeks-container"></div>

  <footer>
    <p>Built during Web Dev unit &nbsp;·&nbsp; Hosted on <a href="https://vercel.com" target="_blank">Vercel</a> &nbsp;·&nbsp; <a href="https://github.com/Pauline-Oraro" target="_blank">GitHub ↗</a></p>
  </footer>

</div>

<script>
  /**
   * ─────────────────────────────────────────────────
   *  EDIT YOUR PROJECTS HERE
   *  status: "done" | "wip" | "pending"
   *  link:   path to the project folder e.g. "./week-01/project-01"
   *          set to "#" if not deployed yet
   * ─────────────────────────────────────────────────
   */
  const weeks = [
    {
      week: 1, dates: "May 3-9",
      projects: [
        { id: "01", name: "Color Palette Generator",    tags: ["HTML", "CSS", "JS"],  status: "done", link: "./01-WEEK/01-PROJECT" },
        { id: "02", name: "Simple Kanban Board",  tags: ["HTML", "CSS", "JS"],     status: "done", link: "./01-WEEK/02-PROJECT" },
      ]
    },

    {
      week: 2, dates: "May 10-16",
      projects: [
        { id: "01", name: "Bookmark Saver",    tags: ["HTML", "CSS", "JS"],  status: "done", link: "./02_WEEK/01_PROJECT/bookmark.html" },
        
      ]
    },
    
  ];

  // ── Render ──────────────────────────────────────
  const container = document.getElementById('weeks-container');
  let doneTotal = 0, wipTotal = 0;

  weeks.forEach((w, wi) => {
    const section = document.createElement('div');
    section.className = 'week';
    section.style.animationDelay = `${wi * 0.05}s`;

    const allDone = w.projects.every(p => p.status === 'done');
    section.innerHTML = `
      <div class="week-header">
        <span class="week-num">WEEK ${String(w.week).padStart(2,'0')}</span>
        <span class="week-title">${w.topic}</span>
        <span class="week-dates">${w.dates}</span>
      </div>
      <div class="projects">
        ${w.projects.map(p => {
          if (p.status === 'done') doneTotal++;
          if (p.status === 'wip')  wipTotal++;
          const badgeText = p.status === 'done' ? 'Done' : p.status === 'wip' ? 'In Progress' : 'Pending';
          return `
            <a href="${p.link}" class="card ${p.status}" ${p.link === '#' ? 'tabindex="-1"' : 'target="_blank"'}>
              <div class="card-top">
                <span class="card-num">#${p.id}</span>
                <span class="badge ${p.status}">${badgeText}</span>
              </div>
              <div class="card-name">${p.name}</div>
              <div class="card-tags">${p.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>
              ${p.link !== '#' ? '<span class="card-arrow">→</span>' : ''}
            </a>`;
        }).join('')}
      </div>`;
    container.appendChild(section);
  });

  // ── Stats ──────────────────────────────────────
  const pendingTotal = 24 - doneTotal - wipTotal;
  const weeksElapsed = weeks.filter(w => w.projects.every(p => p.status === 'done')).length;
  const pct = Math.round((doneTotal / 24) * 100);

  document.getElementById('done-count').textContent    = doneTotal;
  document.getElementById('wip-count').textContent     = wipTotal;
  document.getElementById('pending-count').textContent = pendingTotal;
  document.getElementById('week-count').textContent    = weeksElapsed;
  document.getElementById('pct').textContent           = pct + '%';

  // Animate progress bar
  setTimeout(() => {
    document.getElementById('progress-fill').style.width = pct + '%';
  }, 200);
</script>
</body>
</html>
