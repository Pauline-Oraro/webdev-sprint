<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quote Generator</title>
        <link rel="stylesheet" href="/08_WEEK/01_PROJECT/index.css" />
    </head>
    <body>
        <div class="container">
            <div class="quote-card">
                <p class="quote-text" id="quoteText">Quote will go here!</p>
                <p class="quote-author" id="quoteAuthor">Author name will go here!</p>

                <div class="buttons">
                    <button class="btn copy-btn" id="copyBtn">Copy</button>
                    <button class="btn new-btn" id="newBtn">New Quote</button>
                </div>
            </div>
        </div>
        <script src="/08_WEEK/01_PROJECT/index.js"></script>
    </body>
</html>
